name: Enforce PR source branch

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Block PRs not from dev
        if: github.head_ref != 'dev'
        run: |
          echo "::error::PRs to main must come from the 'dev' branch. Current source: '${{ github.head_ref }}'"
          exit 1
